name: money_tracker_app
description: "Offline personal finance tracker for income, expenses, and budgets."
publish_to: "none"

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
version: 1.0.0+1

environment:
  sdk: ^3.6.0

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  fl_chart: ^0.70.1
  intl: ^0.20.1
  flutter_colorpicker: ^1.1.0
  bloc: ^9.0.0
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  path: ^1.9.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  csv: ^6.0.0
  archive: ^4.0.9
  pdf: ^3.12.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#00B2E7"
  adaptive_icon_foreground: assets/icon/app_icon.png
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#00B2E7"
    theme_color: "#00B2E7"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
